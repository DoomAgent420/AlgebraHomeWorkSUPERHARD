<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Javeus.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;
    --bg-elevated:#141414;
    --sidebar-bg:#000000;
    --surface-light:#f1f1f1;
    --surface-light-hover:#e4e4e4;
    --text-primary:#ffffff;
    --text-secondary:#a3a3a3;
    --text-on-light:#202124;
    --amber:#673ab7;
    --amber-soft:#241a33;
    --ice:#9575cd;
    --ice-soft:#1e1a26;
    --border:#2a2a2a;
    --danger:#d93025;
    --radius-sm:6px;
    --radius-md:10px;
    --radius-lg:16px;
    --font-display:'Roboto', system-ui, -apple-system, sans-serif;
    --font-body:'Roboto', system-ui, -apple-system, sans-serif;
    --font-mono:ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text-primary);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important; transition:none!important;} }
  a{color:inherit;}
  button{font-family:inherit;}
  :focus-visible{outline:2px solid var(--ice); outline-offset:2px;}

  /* ---------- demo banner ---------- */
  .demo-banner{
    background:var(--amber-soft); color:var(--ice); font-size:12.5px; text-align:center;
    padding:8px 14px; font-family:var(--font-mono);
  }
  .demo-banner b{color:var(--text-primary);}

  /* ---------- shell ---------- */
  .app-shell{display:flex; min-height:calc(100vh - 0px);}
  .sidebar{
    width:250px; flex-shrink:0; background:var(--sidebar-bg);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    padding:22px 18px; position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{
    font-family:var(--font-display); font-size:19px; font-weight:700;
    margin:0 0 22px 4px; display:flex; align-items:center; gap:8px; letter-spacing:-.01em;
  }
  .brand-mark{width:10px; height:10px; border-radius:50%; background:var(--amber);}
  .side-label{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--text-secondary);
    margin:18px 4px 8px;
  }
  .side-label:first-of-type{margin-top:0;}
  .char-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px;}
  .char-list button{
    all:unset; cursor:pointer; display:flex; align-items:center; gap:10px;
    padding:8px 10px; border-radius:var(--radius-sm); font-size:14px; color:var(--text-primary); width:100%;
  }
  .char-list button:hover{background:var(--bg-elevated);}
  .char-list button.active{background:var(--ice-soft); color:var(--ice);}
  .avatar-dot{
    width:22px; height:22px; border-radius:50%; flex-shrink:0;
    background:var(--amber);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:600; color:#ffffff;
  }
  .nav-links{list-style:none; margin:6px 0 0; padding:0; display:flex; flex-direction:column; gap:2px;}
  .nav-links button{
    all:unset; cursor:pointer; width:100%; padding:9px 10px; border-radius:var(--radius-sm);
    font-size:14px; color:var(--text-secondary);
  }
  .nav-links button:hover{background:var(--bg-elevated); color:var(--text-primary);}
  .nav-links button.active{background:var(--amber-soft); color:var(--amber);}
  .sidebar-footer{margin-top:auto; padding-top:16px; font-size:11px; color:var(--text-secondary); font-family:var(--font-mono);}
  .sidebar-user{display:flex; align-items:center; justify-content:space-between; padding:8px 10px; margin-top:6px; border-top:1px solid var(--border); padding-top:14px;}
  .sidebar-user span{font-size:12.5px; color:var(--text-secondary);}
  .logout-btn{all:unset; cursor:pointer; font-size:11px; color:var(--text-secondary); font-family:var(--font-mono);}
  .logout-btn:hover{color:var(--danger);}

  .topbar{
    display:none; position:sticky; top:0; z-index:20; background:var(--sidebar-bg);
    border-bottom:1px solid var(--border); padding:12px 16px; align-items:center; gap:12px;
  }
  .topbar button{all:unset; cursor:pointer; padding:6px; color:var(--text-primary);}

  .main{flex:1; min-width:0; overflow-y:auto;}
  .main-inner{max-width:1080px; margin:0 auto; padding:32px 28px 80px;}

  .connector{height:1px; border:0; margin:32px 0; background:var(--border);}

  .feedback-tab{
    position:fixed; right:16px; bottom:16px; z-index:40;
    background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-secondary);
    font-size:12px; padding:7px 12px; border-radius:999px; text-decoration:none;
    opacity:.75; transition:opacity .15s ease;
  }
  .feedback-tab:hover{opacity:1; color:var(--text-primary); border-color:var(--amber);}
  @media (max-width:860px){ .feedback-tab{ bottom:12px; right:12px; font-size:11px; padding:6px 10px; } }

  /* ---------- login ---------- */
  .auth-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .auth-card{width:100%; max-width:360px;}
  .auth-brand{display:flex; align-items:center; gap:9px; margin-bottom:26px; font-family:var(--font-display); font-size:22px; font-weight:700;}
  .auth-brand .brand-mark{width:12px; height:12px;}
  .auth-tabs{display:flex; gap:4px; margin-bottom:20px; background:var(--bg-elevated); border-radius:var(--radius-sm); padding:3px;}
  .auth-tabs button{all:unset; cursor:pointer; flex:1; text-align:center; padding:8px; font-size:13px; border-radius:calc(var(--radius-sm) - 2px); color:var(--text-secondary);}
  .auth-tabs button.active{background:var(--amber); color:#fff;}
  .auth-error{color:var(--danger); font-size:12.5px; margin:-8px 0 14px;}
  .auth-hint{font-size:11.5px; color:var(--text-secondary); margin-top:14px; line-height:1.5;}

  /* ---------- hero ---------- */
  .hero{
    position:relative; border-radius:var(--radius-lg); overflow:hidden;
    height:210px; display:flex; align-items:flex-end; padding:24px;
    background:#0c0d10;
  }
  .hero svg{position:absolute; inset:0; width:100%; height:100%;}
  .hero-scrim{ position:absolute; inset:0; z-index:1; background:linear-gradient(0deg, rgba(0,0,0,.75) 0%, rgba(0,0,0,.15) 55%, transparent 80%); }
  .hero-greeting{position:relative; z-index:2;}
  .hero-greeting h1{ font-family:var(--font-display); font-weight:700; font-size:30px; margin:0; text-shadow:0 2px 12px rgba(0,0,0,.6); }
  .hero-greeting p{margin:4px 0 0; color:#d8d8d8; font-size:14px; text-shadow:0 1px 8px rgba(0,0,0,.6);}

  /* ---------- rows / cards ---------- */
  .row-head{display:flex; align-items:baseline; justify-content:space-between; margin:0 0 14px;}
  .row-head h2{font-family:var(--font-display); font-weight:500; font-size:19px; margin:0;}
  .row-head span, .row-head a{font-size:12px; color:var(--text-secondary); font-family:var(--font-mono); text-decoration:none;}
  .row-head a:hover{color:var(--amber);}
  .card-row{display:flex; gap:14px; overflow-x:auto; padding-bottom:10px; scroll-snap-type:x proximity;}
  .card-row::-webkit-scrollbar{height:6px;}
  .card-row::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}
  .persona-card{
    scroll-snap-align:start; flex:0 0 210px; background:var(--surface-light); color:var(--text-on-light);
    border-radius:var(--radius-md); padding:18px; cursor:pointer; border:1px solid transparent;
    transition:transform .15s ease, background .15s ease;
  }
  .persona-card:hover{background:var(--surface-light-hover); transform:translateY(-2px);}
  .persona-card h3{margin:0 0 4px; font-family:var(--font-display); font-size:16px; font-weight:600;}
  .persona-card p{margin:0; font-size:12px; color:#5b5f66;}
  .persona-card .tag{display:inline-block; margin-top:10px; font-family:var(--font-mono); font-size:10px; letter-spacing:.04em; color:#5b5f66; text-transform:uppercase;}
  .empty-note{font-size:13px; color:var(--text-secondary);}

  /* ---------- forms ---------- */
  .page-head{margin-bottom:24px;}
  .page-head h1{font-family:var(--font-display); font-weight:500; font-size:26px; margin:0 0 6px;}
  .page-head p{margin:0; color:var(--text-secondary); font-size:14px;}
  .form-grid{display:grid; grid-template-columns:180px 1fr; gap:28px; align-items:start;}
  .image-drop{
    width:180px; height:180px; border-radius:var(--radius-md); border:1.5px dashed var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    color:var(--text-secondary); font-size:12px; cursor:pointer; text-align:center; padding:10px;
    background:var(--bg-elevated); overflow:hidden;
  }
  .image-drop:hover{border-color:var(--ice); color:var(--ice);}
  .image-drop img{width:100%; height:100%; object-fit:cover;}
  .field{margin-bottom:20px;}
  .field-label-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .field label{font-size:13px; font-weight:500; color:var(--text-primary);}
  .char-count{font-family:var(--font-mono); font-size:11px; color:var(--text-secondary);}
  .char-count.over{color:var(--danger);}
  .field input[type=text], .field input[type=password], .field textarea, .field select{
    width:100%; background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-primary);
    border-radius:var(--radius-sm); padding:10px 12px; font-family:var(--font-body); font-size:14px; resize:vertical;
  }
  .field input:focus, .field textarea:focus{border-color:var(--ice);}
  .field .hint{font-size:12px; color:var(--text-secondary); margin-top:5px;}

  .template-row{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 28px;}
  .template-chip{
    all:unset; cursor:pointer; font-size:12.5px; padding:7px 13px; border-radius:999px;
    background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-secondary);
  }
  .template-chip:hover{border-color:var(--amber); color:var(--amber);}

  .btn{ all:unset; cursor:pointer; display:inline-flex; align-items:center; gap:8px; padding:11px 20px; border-radius:var(--radius-sm); font-size:14px; font-weight:500; }
  .btn[disabled]{opacity:.5; cursor:default;}
  .btn-primary{background:var(--amber); color:#ffffff; width:100%; justify-content:center;}
  .btn-primary:hover{filter:brightness(1.12);}
  .btn-ghost{background:transparent; border:1px solid var(--border); color:var(--text-primary);}
  .btn-ghost:hover{border-color:var(--text-secondary);}
  .btn-danger-ghost{background:transparent; border:1px solid var(--border); color:var(--danger);}
  .btn-danger-ghost:hover{border-color:var(--danger);}
  .btn-row{display:flex; gap:10px; margin-top:8px;}

  .persona-pick-list{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
  .persona-pick{display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px;}
  .persona-pick.active{border-color:var(--ice); color:var(--ice);}

  .checkbox-row{display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; font-size:13.5px; cursor:pointer;}
  .checkbox-row input{accent-color:var(--amber);}

  /* ---------- settings ---------- */
  .settings-block{max-width:480px;}
  .stat-line{display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); font-size:14px;}
  .stat-line b{font-family:var(--font-mono); color:var(--amber);}
  .disclaimer{margin-top:26px; padding:14px 16px; border-radius:var(--radius-sm); background:var(--ice-soft); color:var(--ice); font-size:12.5px; line-height:1.5;}
  .footlink{font-size:12px; color:var(--text-secondary); margin-top:22px;}
  .footlink a{color:var(--ice); text-decoration:none;}
  .footlink a:hover{text-decoration:underline;}

  /* ---------- chat ---------- */
  .chat-shell{display:grid; grid-template-columns:1fr 260px; gap:0; margin:-32px -28px -80px;}
  .chat-main{display:flex; flex-direction:column; height:100vh; border-left:1px solid var(--border); border-right:1px solid var(--border);}
  .chat-header{padding:16px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;}
  .chat-header .stack{display:flex;}
  .chat-header .stack .avatar-dot{margin-left:-8px; border:2px solid var(--bg); width:30px; height:30px; font-size:12px;}
  .chat-header .stack .avatar-dot:first-child{margin-left:0;}
  .chat-header h2{font-family:var(--font-display); font-size:17px; font-weight:600; margin:0;}
  .chat-header p{margin:0; font-size:12px; color:var(--text-secondary);}
  .chat-log{flex:1; overflow-y:auto; padding:22px; display:flex; flex-direction:column; gap:14px;}
  .bubble-row{display:flex; flex-direction:column; max-width:62%;}
  .bubble-row.human{align-self:flex-end; align-items:flex-end;}
  .bubble-row.ai{align-self:flex-start; align-items:flex-start;}
  .bubble-sender{font-size:11px; color:var(--text-secondary); font-family:var(--font-mono); margin-bottom:3px; padding:0 4px;}
  .bubble{padding:12px 15px; border-radius:16px; font-size:14px; line-height:1.5;}
  .bubble.ai{background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-primary); border-bottom-left-radius:4px;}
  .bubble.human{background:var(--amber-soft); color:#ffffff; border-bottom-right-radius:4px;}
  .typing{align-self:flex-start; font-size:12px; color:var(--text-secondary); font-family:var(--font-mono); padding-left:4px;}
  .chat-disclaimer{text-align:center; font-size:11px; color:var(--text-secondary); padding:6px 0 0; font-family:var(--font-mono);}
  .chat-input-row{padding:16px 22px 20px; border-top:1px solid var(--border); display:flex; gap:10px;}
  .chat-input-row input{flex:1; background:var(--bg-elevated); border:1px solid var(--border); color:var(--text-primary); border-radius:999px; padding:12px 18px; font-size:14px; font-family:var(--font-body);}
  .chat-input-row input:focus{border-color:var(--ice);}
  .send-btn{ all:unset; cursor:pointer; width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--amber); color:#ffffff; }
  .send-btn[disabled]{opacity:.5; cursor:default;}
  .quick-settings{padding:20px 18px; overflow-y:auto; height:100vh;}
  .qs-block{margin-bottom:24px;}
  .qs-block h4{font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-secondary); margin:0 0 10px;}
  .history-item{all:unset; display:block; cursor:pointer; width:100%; font-size:12.5px; color:var(--text-secondary); padding:8px 10px; border-radius:var(--radius-sm);}
  .history-item:hover{background:var(--bg-elevated); color:var(--text-primary);}

  .toggle-row{display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-sm);}
  .switch{position:relative; width:38px; height:22px; flex-shrink:0;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{position:absolute; inset:0; background:var(--border); border-radius:999px; cursor:pointer; transition:background .15s ease;}
  .slider:before{content:""; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:transform .15s ease;}
  .switch input:checked + .slider{background:var(--amber);}
  .switch input:checked + .slider:before{transform:translateX(16px);}

  @media (max-width:860px){
    .sidebar{position:fixed; left:0; top:0; z-index:30; transform:translateX(-100%); transition:transform .2s ease; box-shadow:0 0 40px rgba(0,0,0,.5);}
    .sidebar.open{transform:translateX(0);}
    .topbar{display:flex;}
    .main-inner{padding:22px 16px 70px;}
    .form-grid{grid-template-columns:1fr;}
    .image-drop{width:120px; height:120px;}
    .chat-shell{grid-template-columns:1fr; margin:-22px -16px -70px;}
    .quick-settings{display:none;}
    .chat-main{border-left:none; border-right:none;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================================
   CONFIG — point this at your deployed Worker (see worker/README.md).
   Leave blank to run in local demo mode (fake data, no real AI, no
   persistence between reloads) so the UI still previews standalone.
   ===================================================================== */
const API_BASE = "https://falling-truth-1eb4.chrisjlove2022.workers.dev"; // e.g. "https://javeus-api.yourname.workers.dev"
const DEMO_MODE = !API_BASE;

const FEEDBACK_URL = "https://forms.gle/JxWnSMDcmihmo4Ck9";
const LANGUAGES = ['English','Mandarin Chinese','Hindi','Spanish','French','Arabic','Bengali','Portuguese','Russian','Urdu'];

const TEMPLATES = [
  { label:'Tabletop Game Master', name:'The Warden', description:"A tabletop game master who narrates your party's adventure, tracks stakes, and never breaks tension for long.", notes:'Describe scenes vividly. Ask "what do you do?" often. Keep NPCs distinct.' },
  { label:'Homework Helper', name:'Professor Lin', description:'A patient tutor who walks through problems step by step instead of just giving answers.', notes:'Ask guiding questions before revealing solutions. Encouraging tone.' },
  { label:'Startup Mentor', name:'Priya', description:'A no-nonsense startup mentor with big energy who pushes you to ship faster.', notes:'Confident, punchy one-liners. Calls out excuses kindly but directly.' },
  { label:'Community Organizer', name:'Marcus', description:'A grounded community organizer who helps you think through causes worth fighting for.', notes:'Grounded, practical, avoids empty slogans. Asks who else is affected.' },
  { label:'Straight-Talking Lawyer', name:'Denise', description:'A sharp, fast-talking advocate who explains the angles nobody else will say out loud.', notes:'Witty, a little theatrical, but always circles back to the real risk.' },
  { label:'Stranded Space Pilot', name:'Kade', description:'A pilot stuck on a dying ship, methodically solving one system failure at a time.', notes:'Calm under pressure. Dry gallows humor. Loves technical detail.' },
  { label:'Class Reunion Glow-Up', name:'Reese', description:'Someone walking back into their hometown reunion completely transformed, ready to rewrite old reputations.', notes:'Confident, a little nervous underneath it. References the "old days" sparingly.' },
  { label:'Code Reviewer (strictly legal use)', name:'Byte', description:'A meticulous code reviewer who only ever helps with legitimate software — and jokes about the disclaimer constantly.', notes:'Deadpan about the "strictly legal" bit. Otherwise a sharp, precise reviewer.' },
];

/* =====================================================================
   Backend — real fetch calls to the Worker, or an in-memory demo
   standing in for it. Same method names either way so the rest of the
   app never has to know which one it's talking to.
   ===================================================================== */
const RealBackend = {
  async req(path, opts={}){
    const res = await fetch(API_BASE + path, {
      credentials:'include',
      headers:{'Content-Type':'application/json'},
      ...opts,
    });
    let data = null;
    try{ data = await res.json(); }catch(e){}
    if(!res.ok) throw new Error((data && data.error) || 'Request failed');
    return data;
  },
  signup: (username,password) => RealBackend.req('/api/auth/signup', {method:'POST', body:JSON.stringify({username,password})}),
  login: (username,password) => RealBackend.req('/api/auth/login', {method:'POST', body:JSON.stringify({username,password})}),
  logout: () => RealBackend.req('/api/auth/logout', {method:'POST'}),
  me: () => RealBackend.req('/api/me'),
  updateMe: (description) => RealBackend.req('/api/me', {method:'PUT', body:JSON.stringify({description})}),
  listCharacters: () => RealBackend.req('/api/characters'),
  createCharacter: (c) => RealBackend.req('/api/characters', {method:'POST', body:JSON.stringify(c)}),
  listPersonas: () => RealBackend.req('/api/personas'),
  createPersona: (p) => RealBackend.req('/api/personas', {method:'POST', body:JSON.stringify(p)}),
  listRooms: () => RealBackend.req('/api/rooms'),
  createRoom: (r) => RealBackend.req('/api/rooms', {method:'POST', body:JSON.stringify(r)}),
  getMessages: (type,id) => RealBackend.req(`/api/messages?type=${type}&id=${id}`),
  sendChat: (payload) => RealBackend.req('/api/chat', {method:'POST', body:JSON.stringify(payload)}),
};

const DemoBackend = (() => {
  let users = {};
  let currentUser = null;
  let characters = [
    { id:'c1', name:'Nova', description:'A stranded navigator plotting a course home, one star chart at a time.', notes:'Speaks in short, technical sentences. Dry humor about being lost.' },
    { id:'c2', name:'Sage', description:'A blunt, well-read mentor who answers questions with better questions.', notes:'Never says "I understand." Prefers one-line answers.' },
    { id:'c3', name:'Quill', description:'A slightly chaotic co-writer who always wants to raise the stakes.', notes:'Enthusiastic. Suggests wild plot twists unprompted.' },
  ];
  let personas = [];
  let rooms = [];
  let messages = {}; // key: type:id -> [{sender_type, sender_name, sender_id, content}]
  const DEMO_REPLIES = {
    short: ["Fair point.", "Tell me more.", "Hah — not what I expected.", "Go on.", "I like where this is going."],
    long: [
      "That's the kind of question I'd usually deflect with a joke, but I'll give it to you straight: it depends on what you're actually optimizing for here, and I don't think you've decided that yet.",
      "Okay, walking through this with you — there are two ways this goes, and honestly the boring one is probably right, even though the other one sounds better out loud."
    ]
  };
  const delay = (ms) => new Promise(r => setTimeout(r, ms));
  const key = (t,id) => `${t}:${id}`;

  return {
    async signup(username, password){
      await delay(200);
      if(users[username]) throw new Error('That username is taken');
      users[username] = { password, description:'' };
      currentUser = { id:username, username, description:'' };
      return currentUser;
    },
    async login(username, password){
      await delay(200);
      if(!users[username]) users[username] = { password, description:'' }; // demo: auto-register on first login
      currentUser = { id:username, username, description: users[username].description };
      return currentUser;
    },
    async logout(){ currentUser = null; },
    async me(){ if(!currentUser) throw new Error('Not authenticated'); return currentUser; },
    async updateMe(description){ currentUser.description = description; users[currentUser.username].description = description; },
    async listCharacters(){ return characters; },
    async createCharacter(c){ const row = {id:'c'+Date.now(), ...c}; characters.push(row); return row; },
    async listPersonas(){ return personas; },
    async createPersona(p){ const row = {id:'p'+Date.now(), ...p}; personas.push(row); return row; },
    async listRooms(){
      return rooms.map(r => ({...r, members: r.character_ids.map(id => characters.find(c=>c.id===id)).filter(Boolean)}));
    },
    async createRoom(r){
      const row = {id:'r'+Date.now(), name:r.name, topic:r.topic||'', character_ids:r.character_ids, autoplay:0, turn_index:0};
      rooms.push(row);
      return {...row, members: row.character_ids.map(id => characters.find(c=>c.id===id))};
    },
    async getMessages(type, id){ return messages[key(type,id)] || []; },
    async sendChat({type, id, message, persona_id, character_id_for_room}){
      await delay(450);
      const k = key(type,id);
      if(!messages[k]) messages[k] = [];
      if(message) messages[k].push({sender_type:'human', sender_name: currentUser.username, content: message});
      let speakerName = 'AI';
      if(type === 'character'){
        const c = characters.find(c=>c.id===id);
        speakerName = c.name;
      } else {
        const room = rooms.find(r=>r.id===id);
        const members = room.character_ids.map(cid => characters.find(c=>c.id===cid));
        let speaker = null;
        if(message){
          speaker = members.find(m => message.toLowerCase().includes('@'+m.name.toLowerCase()));
        }
        if(!speaker && character_id_for_room) speaker = members.find(m=>m.id===character_id_for_room);
        if(!speaker){ speaker = members[room.turn_index % members.length]; room.turn_index = (room.turn_index+1) % members.length; }
        speakerName = speaker.name;
      }
      const pool = Math.random() > .5 ? DEMO_REPLIES.short : DEMO_REPLIES.long;
      const reply = pool[Math.floor(Math.random()*pool.length)];
      messages[k].push({sender_type:'character', sender_name: speakerName, content: reply});
      return { reply, sender_name: speakerName };
    },
  };
})();

function esc(str){ return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function charById(id){ return state.characters.find(c => c.id === id); }
function roomById(id){ return state.rooms.find(r => r.id === id); }
function msgKey(type,id){ return `${type}:${id}`; }

/* =====================================================================
   Boot
   ===================================================================== */
async function boot(){
  try{
    const user = await backend.me();
    state.user = user;
    await loadAll();
  }catch(e){ state.user = null; }
  state.booted = true;
  render();
}

async function loadAll(){
  const [characters, personas, rooms] = await Promise.all([
    backend.listCharacters(), backend.listPersonas(), backend.listRooms()
  ]);
  state.characters = characters;
  state.personas = personas;
  state.rooms = rooms;
}

/* =====================================================================
   Render
   ===================================================================== */
function render(){
  const app = document.getElementById('app');
  if(!state.booted){ app.innerHTML = `<div style="min-height:100vh;"></div>`; return; }
  if(!state.user){ app.innerHTML = authScreen(); attachAuthHandlers(); return; }

  app.innerHTML = `
    ${DEMO_MODE ? `<div class="demo-banner"><b>Demo mode</b> — no backend connected, using fake data that resets on reload. Set <code>API_BASE</code> at the top of the script once your Worker is deployed.</div>` : ''}
    <div class="app-shell">
      <aside class="sidebar ${state.sidebarOpen ? 'open' : ''}">${sidebarHtml()}</aside>
      <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
        <div class="topbar">
          <button id="hamburger" aria-label="Toggle menu">☰</button>
          <strong style="font-family:var(--font-display);">Javeus.ai</strong>
        </div>
        <main class="main"><div class="main-inner">${viewHtml()}</div></main>
      </div>
    </div>
    <a class="feedback-tab" href="${FEEDBACK_URL}" target="_blank" rel="noopener">Feedback</a>
  `;
  attachHandlers();
}

/* ---------------- auth screen ---------------- */
function authScreen(){
  return `
    <div class="auth-screen">
      <div class="auth-card">
        <div class="auth-brand"><span class="brand-mark"></span>Javeus.ai</div>
        <div class="auth-tabs">
          <button data-authmode="login" class="${state.authMode==='login'?'active':''}">Log in</button>
          <button data-authmode="signup" class="${state.authMode==='signup'?'active':''}">Sign up</button>
        </div>
        ${state.authError ? `<div class="auth-error">${esc(state.authError)}</div>` : ''}
        <form id="authForm">
          <div class="field">
            <label for="authUsername">Username</label>
            <input type="text" id="authUsername" maxlength="20" autocomplete="username" required>
          </div>
          <div class="field">
            <label for="authPassword">Password</label>
            <input type="password" id="authPassword" autocomplete="${state.authMode==='login'?'current-password':'new-password'}" required>
          </div>
          <button type="submit" class="btn btn-primary" ${state.authBusy?'disabled':''}>${state.authBusy ? 'Please wait…' : (state.authMode==='login' ? 'Log in' : 'Create account')}</button>
        </form>
        <p class="auth-hint">${DEMO_MODE ? 'Demo mode: any username/password works and nothing is saved beyond this tab.' : 'Your password is hashed server-side. No email required.'}</p>
      </div>
    </div>
  `;
}

function attachAuthHandlers(){
  document.querySelectorAll('[data-authmode]').forEach(btn => {
    btn.addEventListener('click', () => { state.authMode = btn.dataset.authmode; state.authError=''; render(); });
  });
  const form = document.getElementById('authForm');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value;
    state.authBusy = true; state.authError = ''; render();
    try{
      const user = state.authMode === 'login' ? await backend.login(username,password) : await backend.signup(username,password);
      state.user = user;
      await loadAll();
    }catch(err){
      state.authError = err.message || 'Something went wrong';
    }
    state.authBusy = false;
    render();
  });
}

        <div class="qs-block"><h4>Persona</h4>
          <select id="personaSelect" style="width:100%; background:var(--bg-elevated); color:var(--text-primary); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px;">
            <option value="">None</option>
            ${state.personas.map(p => `<option value="${p.id}" ${state.activePersonaId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}
          </select>
        </div>
        <div class="qs-block"><h4>Members</h4>
          ${room.members.map(m => `<div class="history-item" style="cursor:default;">${esc(m.name)}</div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

/* ---------------- handlers ---------------- */
function attachHandlers(){
  document.querySelectorAll('[data-goto]').forEach(el => el.addEventListener('click', () => { stopAutoplay(); state.view = el.dataset.goto; state.sidebarOpen=false; render(); }));

  document.querySelectorAll('[data-goto-chat]').forEach(el => el.addEventListener('click', async () => {
    stopAutoplay();
    const c = charById(el.dataset.gotoChat);
    if(!c) return;
    state.view = 'chat'; state.activeChatCharId = c.id; state.sidebarOpen = false;
    if(!state.chatHistory.some(h=>h.id===c.id)) state.chatHistory.push({id:c.id, name:c.name});
    await ensureMessagesLoaded('character', c.id);
    render();
  }));

  document.querySelectorAll('[data-goto-room]').forEach(el => el.addEventListener('click', async () => {
    stopAutoplay();
    const r = roomById(el.dataset.gotoRoom);
    if(!r) return;
    state.view = 'room'; state.activeRoomId = r.id; state.sidebarOpen = false;
    await ensureMessagesLoaded('room', r.id);
    render();
  }));

  const hamburger = document.getElementById('hamburger');
  if(hamburger) hamburger.addEventListener('click', () => { state.sidebarOpen = !state.sidebarOpen; render(); });

  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.addEventListener('click', async () => { stopAutoplay(); await backend.logout(); state.user = null; render(); });

  /* character creator */
  const charForm = document.getElementById('charForm');
  if(charForm){
    bindCounter('charName','charNameCount',20); bindCounter('charDesc','charDescCount',750); bindCounter('charNotes','charNotesCount',300);
    document.querySelectorAll('[data-template]').forEach(chip => chip.addEventListener('click', () => {
      const t = TEMPLATES[chip.dataset.template];
      document.getElementById('charName').value = t.name;
      document.getElementById('charDesc').value = t.description;
      document.getElementById('charNotes').value = t.notes;
      ['charName','charDesc','charNotes'].forEach(id => document.getElementById(id).dispatchEvent(new Event('input')));
    }));
    charForm.addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('charName').value.trim() || 'Unnamed';
      const description = document.getElementById('charDesc').value.trim();
      const notes = document.getElementById('charNotes').value.trim();
      const row = await backend.createCharacter({name, description, notes});
      state.characters.push(row);
      state.view = 'home'; render();
    });
  }

  /* persona creator */
  const personaForm = document.getElementById('personaForm');
  if(personaForm){
    bindCounter('personaName','personaNameCount',20); bindCounter('personaDesc','personaDescCount',750);
    personaForm.addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('personaName').value.trim() || 'Unnamed';
      const description = document.getElementById('personaDesc').value.trim();
      const row = await backend.createPersona({name, description});
      state.personas.push(row); render();
    });
    document.querySelectorAll('[data-set-persona]').forEach(btn => btn.addEventListener('click', () => { state.activePersonaId = btn.dataset.setPersona; render(); }));
  }

  /* room creator */
  const roomForm = document.getElementById('roomForm');
  if(roomForm){
    bindCounter('roomName','roomNameCount',40);
    bindCounter('roomTopic','roomTopicCount',300);
    roomForm.addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('roomName').value.trim() || 'Untitled Room';
      const topic = document.getElementById('roomTopic').value.trim();
      const character_ids = [...document.querySelectorAll('.room-char-check:checked')].map(c => c.value);
      if(character_ids.length < 2){ alert('Pick at least 2 characters.'); return; }
      const row = await backend.createRoom({name, topic, character_ids});
      state.rooms.push(row); state.view = 'home'; render();
    });
  }

  /* settings */
  const settingsDesc = document.getElementById('settingsDesc');
  if(settingsDesc){
    bindCounter('settingsDesc','settingsDescCount',500);
    document.getElementById('saveSettings').addEventListener('click', async () => {
      const description = settingsDesc.value.trim();
      await backend.updateMe(description);
      state.user.description = description; render();
    });
  }

  /* chat (character or room) */
  const sendBtn = document.getElementById('sendBtn');
  if(sendBtn){
    const input = document.getElementById('chatInput');
    const isRoom = state.view === 'room';
    const convType = isRoom ? 'room' : 'character';
    const convId = isRoom ? state.activeRoomId : state.activeChatCharId;

    const doSend = async () => {
      const text = input.value.trim();
      if(!text || state.awaitingReply) return;
      input.value = '';
      const k = msgKey(convType, convId);
      state.messagesCache[k] = state.messagesCache[k] || [];
      state.messagesCache[k].push({sender_type:'human', sender_name: (state.personas.find(p=>p.id===state.activePersonaId)||state.user).username || state.personas.find(p=>p.id===state.activePersonaId)?.name || state.user.username, content: text});
      state.awaitingReply = true; render(); scrollChatToBottom();
      try{
        const res = await backend.sendChat({type: convType, id: convId, message: text, persona_id: state.activePersonaId});
        state.messagesCache[k].push({sender_type:'character', sender_name: res.sender_name, content: res.reply});
      }catch(err){
        state.messagesCache[k].push({sender_type:'character', sender_name:'System', content: 'Something went wrong reaching the model: ' + err.message});
      }
      state.awaitingReply = false; render(); scrollChatToBottom();
    };
    sendBtn.addEventListener('click', doSend);
    input.addEventListener('keydown', e => { if(e.key==='Enter') doSend(); });
    scrollChatToBottom();

    if(!isRoom){
      document.getElementById('resetChat').addEventListener('click', () => {
        if(confirm('Reset this chat? This clears it from view (history stays on the server).')){
          state.messagesCache[msgKey('character',convId)] = []; render();
        }
      });
      document.getElementById('downloadChar').addEventListener('click', () => {
        const c = charById(convId);
        const blob = new Blob([JSON.stringify(c, null, 2)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${c.name.replace(/\s+/g,'_')}.json`; a.click();
      });
      document.getElementById('languageSelect').addEventListener('change', e => { state.language = e.target.value; });
    } else {
      const autoplayToggle = document.getElementById('autoplayToggle');
      autoplayToggle.addEventListener('change', e => {
        const room = roomById(convId);
        room.autoplay = e.target.checked ? 1 : 0;
        if(room.autoplay) startAutoplay(room.id); else stopAutoplay();
      });
      if(roomById(convId).autoplay) startAutoplay(convId);
    }

    document.getElementById('personaSelect').addEventListener('change', e => { state.activePersonaId = e.target.value || null; render(); });
  }
}

function startAutoplay(roomId){
  stopAutoplay();
  state.autoplayTimer = setInterval(async () => {
    if(state.awaitingReply || state.view !== 'room' || state.activeRoomId !== roomId) return;
    state.awaitingReply = true; render();
    try{
      const res = await backend.sendChat({type:'room', id: roomId, message: null, persona_id: state.activePersonaId});
      const k = msgKey('room', roomId);
      state.messagesCache[k] = state.messagesCache[k] || [];
      state.messagesCache[k].push({sender_type:'character', sender_name: res.sender_name, content: res.reply});
    }catch(err){ /* quietly skip a beat on error */ }
    state.awaitingReply = false; render(); scrollChatToBottom();
  }, 4000);
}
function stopAutoplay(){ if(state.autoplayTimer){ clearInterval(state.autoplayTimer); state.autoplayTimer = null; } }

async function ensureMessagesLoaded(type, id){
  const k = msgKey(type,id);
  if(state.messagesCache[k]) return;
  try{ state.messagesCache[k] = await backend.getMessages(type,id); }
  catch(e){ state.messagesCache[k] = []; }
}

function scrollChatToBottom(){
  requestAnimationFrame(() => { const log = document.getElementById('chatLog'); if(log) log.scrollTop = log.scrollHeight; });
}

function bindCounter(inputId, countId, max){
  const input = document.getElementById(inputId);
  const count = document.getElementById(countId);
  const update = () => { const len = input.value.length; count.textContent = `${len}/${max}`; count.classList.toggle('over', len >= max); };
  input.addEventListener('input', update);
}

boot();
</script>
</body>
</html>
